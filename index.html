<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zidan's Private Chat 🔥</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <style>
        /* --- CSS (ডিজাইন) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            background: #262626;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .chat-header {
            background: #ff4757;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .messages-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            word-break: break-all;
        }
        .message.incoming {
            background: #3e3e3e;
            align-self: flex-start;
        }
        .message.outgoing {
            background: #2ed573;
            align-self: flex-end;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: #1e1e1e;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            outline: none;
        }
        button {
            padding: 12px 20px;
            background: #ff4757;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #e04050; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header"> ONLY OUR PRIVATE CHAT</div>
        <div class="messages-box" id="messagesBox"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder=" SAY HELLO!" autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        // ১. সার্ভারের সাথে কানেক্ট করা (লোকালি টেস্ট করার জন্য localhost)
        // যখন Render-এ হোস্ট করবে, তখন নিচের লিংকের জায়গায় তোমার render-এর লিংক বসাবে
        const socket = io("http://localhost:3000"); 

        const messagesBox = document.getElementById('messagesBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // ২. স্ক্রিনে মেসেজ দেখানোর ফাংশন
        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', type);
            msgDiv.innerText = text;
            messagesBox.appendChild(msgDiv);
            messagesBox.scrollTop = messagesBox.scrollHeight; // অটো স্ক্রোল নিচে নামবে
        }

        // ৩. বাটনে চাপ দিলে সার্ভারে মেসেজ পাঠানো
        sendBtn.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if(message !== "") {
                appendMessage(message, 'outgoing'); // নিজের স্ক্রিনে দেখাও
                socket.emit('send_message', message); // সার্ভারে পাঠাও
                messageInput.value = "";
            }
        });

        // এন্টার চাপ দিলেও যেন মেসেজ যায়
        messageInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendBtn.click();
        });

        // ৪. সার্ভার থেকে অন্য বন্ধুদের পাঠানো মেসেজ রিসিভ করা
        socket.on('receive_message', (data) => {
            appendMessage(data, 'incoming'); // বন্ধুদের স্ক্রিনে দেখাও
        });
    </script>
</body>
</html>
