<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zidan's Private Chat 🔥</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <style>
        /* --- CSS (ডিজাইন) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            background: #262626;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .chat-header {
            background: #ff4757;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .messages-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            word-break: break-all;
        }
        .message.incoming {
            background: #3e3e3e;
            align-self: flex-start;
        }
        .message.outgoing {
            background: #2ed573;
            align-self: flex-end;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: #1e1e1e;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            outline: none;
        }
        button {
            padding: 12px 20px;
            background: #ff4757;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #e04050; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header"> ONLY OUR PRIVATE CHAT</div>
        <div class="messages-box" id="messagesBox"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder=" SAY HELLO!" autocomplete="off">
            <!-- ছবি সিলেক্ট করার বাটন এবং ইনপুট -->
            <label for="fileInput" style="cursor: pointer; color: #0084ff; font-size: 1.5rem; padding-right: 5px;">🖼️</label>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        // ১. সার্ভারের সাথে কানেক্ট করা (লোকালি টেস্ট করার জন্য localhost)
        // যখন Render-এ হোস্ট করবে, তখন নিচের লিংকের জায়গায় তোমার render-এর লিংক বসাবে
        const socket = io("https://my-chat-web-7lqh.onrender.com"); 

        const messagesBox = document.getElementById('messagesBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // ২. স্ক্রিনে মেসেজ দেখানোর ফাংশন
       function appendMessage(data, type) {
    msgDiv = document.createElement('div');
    msgDiv = document.createElement('div');
    msgDiv.classList.add('message', type);
    
    // যদি ডাটাটি ছবি হয় তবে img ট্যাগ দেখাবে, না হলে সাধারণ টেক্সট
    if (data.msgType === 'image') {
        msgDiv.innerHTML = `<img src="${data.content}" style="max-width: 100%; border-radius: 10px; display: block;">`;
    } else {
        msgDiv.innerText = data.content;
    }
    
    messagesBox.appendChild(msgDiv);
    messagesBox.scrollTop = messagesBox.scrollHeight;
} // অটো স্ক্রোল নিচে নামবে
        

       // ৩. বাটনে চাপ দিলে সার্ভারে মেসেজ পাঠানো
sendBtn.addEventListener('click', () => {
    const message = messageInput.value.trim();
    if(message !== "") {
        const data = { msgType: 'text', content: message }; // মেসেজকে অবজেক্ট বানালাম
        appendMessage(data, 'outgoing'); // নিজের স্ক্রিনে দেখাও
        socket.emit('send_message', data); // সার্ভারে পাঠাও
        messageInput.value = "";
    }
});

// এন্টার চাপ দিলেও যেন মেসেজ যায়
messageInput.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') sendBtn.click();
});

        // এন্টার চাপ দিলেও যেন মেসেজ যায়
        messageInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendBtn.click();
        });
        const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // স্ক্রিনে লোডিং দেখানো
    const loadingDiv = document.createElement('div');
    loadingDiv.classList.add('message', 'outgoing');
    loadingDiv.innerText = "ছবি যাচ্ছে... ⏳";
    messagesBox.appendChild(loadingDiv);

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'chat_image_preset'); // ফ্রি পাবলিক প্রিসেট

    try {
        const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', {
            method: 'POST',
            body: formData
        });
        const uploadedData = await res.json();
        
        messagesBox.removeChild(loadingDiv); // লোডিং টেক্সট মুছে ফেলা

        if (uploadedData.secure_url) {
            const data = { msgType: 'image', content: uploadedData.secure_url };
            appendMessage(data, 'outgoing');
            socket.emit('send_message', data); // সার্ভারে পাঠানো
        }
    } catch (error) {
        loadingDiv.innerText = "ব্যর্থ হয়েছে! ❌";
    }
    fileInput.value = "";
});

        // ৪. সার্ভার থেকে অন্য বন্ধুদের পাঠানো মেসেজ রিসিভ করা
        socket.on('receive_message', (data) => {
            appendMessage(data, 'incoming'); // বন্ধুদের স্ক্রিনে দেখাও
        });
    </script>
</body>
</html>
